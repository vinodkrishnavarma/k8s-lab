name: Test Pipeline with Docker and PR Comment

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: vinodkv1
          password: pinnacle1%
        continue-on-error: true

      - name: Test Docker Login
        run: |
          echo "Testing Docker login action"
          docker --version
          echo "Docker login test passed"

      - name: Add PR Comment
        uses: mshick/add-pr-comment@v2
        if: github.event_name == 'pull_request'
        with:
          message: |
            ## Test Pipeline Report
            ✅ Docker login action executed
            ✅ Test workflow completed successfully
            
            **Workflow Details:**
            - Event: ${{ github.event_name }}
            - Ref: ${{ github.ref }}
            - SHA: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Success Message
        run: |
          echo "✅ Pipeline test completed!"
          echo "Both docker/login-action@v3 and mshick/add-pr-comment@v2 were tested"
